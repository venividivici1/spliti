// Minimal, XSS-safe Markdown -> HTML (everything is escaped before formatting).
function mdToHtml(src) {
  const e = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const inline = s => e(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const lines = (src||'').replace(/\r/g,'').split('\n');
  let html='', i=0, para=[];
  const flush = () => { if (para.length) { html+='<p>'+para.map(inline).join('<br>')+'</p>'; para=[]; } };
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) { flush(); i++; const code=[];
      while (i<lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++; html+='<pre><code>'+e(code.join('\n'))+'</code></pre>'; continue; }
    let h;
    if ((h = line.match(/^(#{1,6})\s+(.*)$/))) { flush(); html+='<strong class="md-h">'+inline(h[2])+'</strong>'; i++; continue; }
    if (/^\s*[-*]\s+/.test(line)) { flush(); html+='<ul>';
      while (i<lines.length && /^\s*[-*]\s+/.test(lines[i])) { html+='<li>'+inline(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>'; i++; }
      html+='</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { flush(); html+='<ol>';
      while (i<lines.length && /^\s*\d+\.\s+/.test(lines[i])) { html+='<li>'+inline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>'; i++; }
      html+='</ol>'; continue; }
    if (line.trim()==='') { flush(); i++; continue; }
    para.push(line); i++;
  }
  flush();
  return html;
}

let chatBusy = false;
async function sendChat(q) {
  q = (q||'').trim(); if (!q || chatBusy) return;
  const gid = state.current;
  const hist = state.chats[gid] || (state.chats[gid] = []);
  // The chat is AI-backed, so it needs the network. Offline, answer locally with a
  // friendly note instead of a failed request.
  if (!navigator.onLine) {
    $('#chatQ').value = '';
    hist.push({ role: 'user', content: q });
    hist.push({ role: 'assistant', content: 'I need an internet connection to answer — your balances and history still work offline, though.' });
    renderChat();
    return;
  }
  const priorTurns = hist.map(m => ({role:m.role, content:m.content}));
  $('#chatQ').value = '';
  hist.push({role:'user', content:q});
  hist.push({role:'assistant', content:''});
  const idx = hist.length - 1;
  chatBusy = true; renderChat();
  try {
    const r = await fetchAuthed('/api/groups/'+gid+'/ask', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question:q, history:priorTurns}),
    });
    if (!r.ok) { const t = await r.json().catch(()=>({detail:r.statusText})); throw new Error(t.detail||'error'); }
    const reader = r.body.getReader(); const dec = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read(); if (done) break;
      hist[idx].content += dec.decode(value, {stream:true}); renderChat();
    }
    if (!hist[idx].content) hist[idx].content = '(no answer)';
  } catch(e) { hist[idx].content = '⚠ ' + e.message; }
  chatBusy = false; renderChat();
}

// Build mermaid config from the live theme so the pie text contrasts with the
// modal — a fixed 'dark' theme rendered near-white text that was invisible on
// the light theme. Driven by our CSS vars (--text is dark on light, light on
// dark), so it follows the toggle.
function mermaidConfig() {
  const cs = getComputedStyle(document.documentElement);
  const v = n => cs.getPropertyValue(n).trim();
  const text = v('--text'), line = v('--line');
  return {
    startOnLoad: false,
    securityLevel: 'strict',
    theme: 'base',
    themeVariables: {
      fontFamily: v('--font-body') || 'sans-serif',
      // Title + legend sit on the modal background, so follow the theme text colour.
      textColor: text,
      pieTitleTextColor: text,
      pieLegendTextColor: text,
      // Slice values sit on the (always light) pastel wedges, so keep them dark
      // in both themes for contrast — matching mermaid's own default.
      pieSectionTextColor: '#1a1a2e',
      pieStrokeColor: line,
      pieOuterStrokeColor: line,
    },
  };
}

// ============================================================================
//  Push notifications — subscribe via the service worker, manage per-category prefs
// ============================================================================
const NOTIFY_CATS = [
  ['new_expense', 'New expenses'],
  ['settlement', 'Settlements'],
  ['balance', 'When you owe or are owed'],
  ['delete_restore', 'Deleted or restored expenses'],
];
const pushSupported = () =>
  'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;

function urlB64ToUint8Array(b64) {
  const pad = '='.repeat((4 - (b64.length % 4)) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}
async function currentSubscription() {
  if (!pushSupported()) return null;
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}
function sameKey(a, b) {
  if (!a || !b || a.byteLength !== b.byteLength) return false;
  const x = new Uint8Array(a), y = new Uint8Array(b);
  for (let i = 0; i < x.length; i++) if (x[i] !== y[i]) return false;
  return true;
}
async function enablePush(publicKey) {
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') throw new Error('Notifications were not allowed');
  const reg = await navigator.serviceWorker.ready;
  const appKey = urlB64ToUint8Array(publicKey);
  let sub = await reg.pushManager.getSubscription();
  // A subscription made with a different (rotated) VAPID key can never receive our
  // pushes — drop it and re-subscribe with the current key.
  if (sub && !sameKey(sub.options && sub.options.applicationServerKey, appKey.buffer)) {
    try { await sub.unsubscribe(); } catch (_) {}
    sub = null;
  }
  if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: appKey });
  await api('POST', '/notify/subscribe', sub.toJSON());
}
async function disablePush() {
  const sub = await currentSubscription();
  if (!sub) return;
  try { await api('POST', '/notify/unsubscribe', { endpoint: sub.endpoint }); } catch (_) {}
  await sub.unsubscribe();
}

async function renderSettings(box) {
  if (!pushSupported()) {
    box.innerHTML = '<p class="muted">Notifications aren’t supported on this device or browser. On iPhone, install the app to your Home Screen first (Share → Add to Home Screen).</p>';
    return;
  }
  let cfg = { enabled: false };
  try { cfg = await api('GET', '/notify/config'); } catch (_) {}
  if (!cfg.enabled) {
    box.innerHTML = '<p class="muted">Notifications aren’t set up on the server yet.</p>';
    return;
  }
  let prefs = {};
  try { prefs = await api('GET', '/notify/prefs'); } catch (_) {}
  const sub = await currentSubscription();
  const denied = Notification.permission === 'denied';
  const on = !!sub && Notification.permission === 'granted';
  box.innerHTML = `
    <label class="notif-row"><span class="notif-lead">Enable notifications</span>
      <input type="checkbox" id="notifMaster" ${on ? 'checked' : ''} ${denied ? 'disabled' : ''}></label>
    ${denied ? '<p class="muted">Blocked in your browser/OS settings — re-enable Spliti notifications there to turn this on.</p>' : ''}
    <div class="notif-cats ${on ? '' : 'dim'}" id="notifCats">
      ${NOTIFY_CATS.map(([k, label]) => `<label class="notif-row"><span>${label}</span>
        <input type="checkbox" data-cat="${k}" ${prefs[k] !== false ? 'checked' : ''}></label>`).join('')}
    </div>`;
  const master = box.querySelector('#notifMaster');
  if (master) master.onchange = async () => {
    master.disabled = true;
    try {
      if (master.checked) { await enablePush(cfg.public_key); toast('Notifications on'); }
      else { await disablePush(); toast('Notifications off'); }
    } catch (e) { toast(e.message || 'Couldn’t change notifications'); }
    renderSettings(box);  // reflect the new state (also re-enables the control)
  };
  box.querySelectorAll('[data-cat]').forEach(cb => cb.onchange = async () => {
    const next = {};
    box.querySelectorAll('[data-cat]').forEach(c => { next[c.dataset.cat] = c.checked; });
    try { await api('PUT', '/notify/prefs', next); } catch (_) { toast('Couldn’t save that preference'); }
  });
}

function settingsModal() {
  const ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.innerHTML = `<div class="modal">
    <div class="modal-title">Notifications</div>
    <div id="setBody" class="modal-msg" style="margin-bottom:14px">Loading…</div>
    <div class="modal-actions"><button data-act="ok">Done</button></div>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(() => ov.classList.add('show'));
  const close = () => { ov.classList.remove('show'); setTimeout(() => ov.remove(), 200); };
  ov.querySelector('[data-act=ok]').onclick = close;
  ov.onclick = e => { if (e.target === ov) close(); };
  renderSettings(ov.querySelector('#setBody'));
}
$('#settingsBtn').onclick = settingsModal;

// Background sync: periodically retry the outbox and pull in anything other
// members added. flush() guards against overlap and attempts the network itself
// (it doesn't trust navigator.onLine), so firing it on a timer, on regaining
// focus/visibility, and on the 'online' event means a reconnect is picked up
// within one interval even when the 'online' event never fires.
const SYNC_INTERVAL_MS = 20000;
setInterval(() => { if (state.current) flush(); }, SYNC_INTERVAL_MS);
document.addEventListener('visibilitychange', () => { if (!document.hidden && state.current) flush(); });
window.addEventListener('focus', () => { if (state.current) flush(); });

// Register the service worker so the app is installable / works standalone.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
  // A push that arrives while the app is open asks us to sync in place rather
  // than show a banner (see sw.js) — reuse the normal sync path.
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'sync' && state.current) flush();
  });
}
</script>
</body>
</html>
