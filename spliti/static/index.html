<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1419" />
<title>Spliti · Spiti trip expenses</title>
<!-- PWA: installable on Android (manifest) and iOS (apple-touch-icon + standalone) -->
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Spliti" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel2: #222c39; --line: #2c3845;
    --text: #e6edf3; --muted: #8b98a8; --accent: #2dd4a7; --accent2: #1f9d7c;
    --red: #f7768e; --green: #2dd4a7; --chip: #2a3543;
    --btn-text: #06281f; --overlay: rgba(0,0,0,0.55);
    --header-bg: rgba(15,20,25,0.96); --header-bg2: rgba(15,20,25,0.82);
    --nav-bg: rgba(26,33,43,0.92);
    --hover-highlight: rgba(255,255,255,0.04); --code-bg: rgba(0,0,0,0.28);
    --skel-mid: #2f3b4a; --pre-bg: #0f1419;
    --font-body: 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --font-display: 'Fredoka', 'Plus Jakarta Sans', system-ui, sans-serif;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="light"] {
    --bg: #f0f2f5; --panel: #ffffff; --panel2: #e8ecf1; --line: #d1d9e0;
    --text: #1a1a2e; --muted: #5a6370; --accent: #0d9373; --accent2: #0b7a60;
    --red: #dc3545; --green: #0d9373; --chip: #dce3eb;
    --btn-text: #ffffff; --overlay: rgba(0,0,0,0.35);
    --header-bg: rgba(255,255,255,0.96); --header-bg2: rgba(255,255,255,0.82);
    --nav-bg: rgba(255,255,255,0.92);
    --hover-highlight: rgba(0,0,0,0.04); --code-bg: rgba(0,0,0,0.08);
    --skel-mid: #cfd8e0; --pre-bg: #e8ecf1;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  /* Suppress the double-tap-to-zoom jump on taps without disabling pinch-zoom
     (keeps it accessible — WCAG 1.4.4). */
  button, .seg, .tabs, .bottomnav, .syncbtn, .theme-toggle { touch-action: manipulation; }
  body { margin: 0; font: 16px/1.55 var(--font-body);
    /* Fill the viewport so the fixed gradient always covers the screen. Without
       this, a short tab (empty History/Balance) leaves the body shorter than the
       viewport and iOS clips the fixed background, exposing a bare band below the
       header. min-height:100dvh tracks the dynamic toolbar; 100vh is the fallback. */
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1100px 460px at 100% -8%, rgba(45,212,167,0.10), transparent 60%),
      radial-gradient(900px 420px at -10% 0%, rgba(122,162,247,0.08), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text); -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  a { color: var(--accent); }
  /* tabular money so columns line up */
  .amt, .stat-v, .exact, .split-sum { font-variant-numeric: tabular-nums; }

  /* ---- theme toggle ---- */
  .theme-toggle { margin-left: auto; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 50%; width: 36px; height: 36px; min-height: 0; padding: 0;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: var(--muted); transition: color 0.2s ease, background 0.2s ease; flex: none; }
  .theme-toggle:hover { color: var(--accent); background: var(--hover-highlight); }
  .theme-toggle svg { width: 18px; height: 18px; }

  /* the title column grows so the sync icon + toggle always sit at the right edge */
  header > div { flex: 1 1 auto; min-width: 0; }
  /* small sync-status icon (tap to force a sync) */
  .syncbtn { flex: none; display: inline-flex; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 6px; min-height: 0;
    border-radius: 999px; transition: color 0.2s ease, background 0.2s ease; }
  .syncbtn .ic-svg { width: 19px; height: 19px; }
  .syncbtn .cnt { font-size: 10px; font-weight: 700; line-height: 1;
    background: var(--accent); color: var(--btn-text); border-radius: 999px; padding: 2px 5px; }
  .syncbtn.ok { color: var(--green); }
  .syncbtn.busy { color: var(--accent); }
  .syncbtn.off { color: var(--muted); }
  .syncbtn.off .cnt { background: var(--muted); color: #fff; }
  .syncbtn .ic-svg.spin { animation: spin 0.9s linear infinite; transform-origin: 50% 50%; }

  /* ---- header (mobile-first, sticky) ---- */
  header { position: sticky; top: 0; z-index: 10; flex: none;
    background: linear-gradient(180deg, var(--header-bg), var(--header-bg2));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: calc(13px + env(safe-area-inset-top, 0px)) 16px 13px;
    border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 11px; }
  header .logo { line-height: 0; flex: none; color: var(--accent);
    filter: drop-shadow(0 2px 6px rgba(45,212,167,0.35)); animation: logoBob 3.2s ease-in-out infinite; }
  @keyframes logoBob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-3px) rotate(4deg); } }
  header h1 { margin: 0; font-family: var(--font-display); font-size: 23px; font-weight: 700;
    letter-spacing: -0.3px; line-height: 1.05; }
  header h1 .b { background: linear-gradient(90deg, var(--accent), #7aa2f7);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  header .sub { color: var(--muted); font-size: 12px; display: block; margin-top: 1px; }

  /* ---- layout: single centered column ---- */
  /* wrap/main grow to fill the viewport so short tabs don't leave a gap. */
  .wrap { display: flex; flex-direction: column; flex: 1 0 auto; }
  .main { flex: 1 0 auto; padding: 16px; padding-bottom: calc(86px + var(--safe-b)); }

  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
    margin: 0 0 10px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; margin-bottom: 14px; }

  /* ---- form controls: big touch targets, 16px to avoid iOS zoom ---- */
  input, select, button { font: inherit; }
  input, select { background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 12px 13px; width: 100%; font-size: 16px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input.suggested { color: var(--muted); font-style: italic; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; }
  button { background: var(--accent); color: var(--btn-text); border: none; border-radius: 10px;
    padding: 12px 16px; font-weight: 600; cursor: pointer; min-height: 46px; }
  button:active { transform: scale(0.98); }
  button.ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
  button.sm { padding: 8px 12px; min-height: 38px; font-size: 14px; }
  /* compact pill — for secondary actions sitting next to a small heading */
  button.pill-btn { min-height: 0; padding: 6px 12px; font-size: 13px; font-weight: 600;
    border-radius: 999px; }

  .addrow { display: flex; gap: 8px; }
  .addrow input { flex: 1; }
  .addrow button { flex: none; }

  /* expense fields: stacked on mobile, inline on >=640px */
  .fields { display: grid; gap: 12px; grid-template-columns: 1fr; }
  .seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .seg button { flex: 1; background: var(--panel2); color: var(--muted); border-radius: 0;
    font-weight: 500; min-height: 44px; }
  .seg button.on { background: var(--accent); color: var(--btn-text); }
  #addExpense { width: 100%; margin-top: 4px; }

  /* groups: horizontal scroll pills on mobile, vertical list on desktop */
  .glist { list-style: none; margin: 0; padding: 2px 0 6px; display: flex; gap: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .glist li { flex: 0 0 auto; white-space: nowrap; padding: 10px 14px; border-radius: 999px;
    cursor: pointer; background: var(--panel2); border: 1px solid var(--line);
    display: flex; gap: 8px; align-items: center; }
  .glist li.active { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }
  .glist li.active .count { color: var(--btn-text); }
  .glist .count { color: var(--muted); font-size: 12px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--chip); border: 1px solid var(--line); border-radius: 20px;
    padding: 6px 13px; font-size: 14px; }

  .bal, .sug, .exp { display: flex; justify-content: space-between; align-items: center;
    gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .bal:last-child, .sug:last-child, .exp:last-child { border: none; }
  .pos { color: var(--green); font-weight: 600; } .neg { color: var(--red); font-weight: 600; }
  .zero { color: var(--muted); }
  .hint-line { color: var(--muted); font-size: 13px; margin: -2px 0 10px; }
  .sug .who { display: flex; align-items: center; gap: 8px; }
  .sug .arrow { color: var(--accent); font-weight: 700; }
  .sug .amt { font-weight: 600; white-space: nowrap; }
  .exp .meta { color: var(--muted); font-size: 13px; }
  .exp .amt { font-weight: 600; white-space: nowrap; }
  .exp.deleted { opacity: 0.55; }
  .exp.deleted .exp-desc, .exp.deleted .amt { text-decoration: line-through; }
  .exp.clickable { cursor: pointer; }
  .exp.clickable:hover { background: var(--hover-highlight); border-radius: 8px; }
  /* paid-by vs added-by, shown in the expense detail (by the split chart) */
  .who-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 14px; }
  .who-pill { display: flex; align-items: center; gap: 7px; flex: 1 1 0; min-width: 0;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 11px;
    padding: 8px 11px; font-size: 14px; }
  .who-pill .who-lbl { color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; display: block; line-height: 1.3; }
  .who-pill b { font-weight: 600; }
  .split-chart { display: flex; justify-content: center; margin: 6px 0 14px; min-height: 40px; }
  .split-chart svg { max-width: 100%; height: auto; }
  .split-list { margin-bottom: 16px; }
  .muted { color: var(--muted); }
  .splitrow { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .splitrow input[type=checkbox] { width: 22px; height: 22px; flex: none; accent-color: var(--accent); }
  .splitrow span { flex: 1; }
  .splitrow input.exact { width: 110px; flex: none; }
  .split-sum { font-size: 13px; margin-top: 10px; color: var(--muted); }
  .split-sum.ok { color: var(--green); }
  .split-sum.bad { color: var(--red); }
  .err { color: var(--red); font-size: 13px; min-height: 18px; }
  .empty { color: var(--muted); padding: 40px 16px; text-align: center; }

  /* ---- expense chat ---- */
  .chatlog { display: flex; flex-direction: column; gap: 8px; max-height: 320px;
    overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .msg { padding: 10px 13px; border-radius: 14px; max-width: 88%; white-space: pre-wrap;
    word-wrap: break-word; line-height: 1.45; font-size: 15px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--btn-text);
    border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel2); border: 1px solid var(--line);
    border-bottom-left-radius: 4px; white-space: normal; }
  .msg.bot p { margin: 0 0 8px; } .msg.bot p:last-child { margin: 0; }
  .msg.bot ul, .msg.bot ol { margin: 4px 0 8px; padding-left: 20px; }
  .msg.bot li { margin: 2px 0; }
  .msg.bot .md-h { display: block; font-weight: 700; margin: 6px 0 4px; }
  .msg.bot code { background: var(--code-bg); padding: 1px 5px; border-radius: 5px;
    font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .msg.bot pre { background: var(--pre-bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; overflow-x: auto; margin: 6px 0; }
  .msg.bot pre code { background: none; padding: 0; }
  .msg.hint { align-self: center; background: none; color: var(--muted); font-size: 13px;
    text-align: center; }
  .chat-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px; }
  .chat-suggest button { background: var(--chip); color: var(--muted); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 12px; min-height: 0; font-size: 13px; font-weight: 500; }
  .grouphead { display: flex; justify-content: space-between; align-items: center; gap: 10px;
    margin-bottom: 10px; }
  .grouphead h1 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 700; }

  /* ---- tabs ---- */
  .chips.members { margin-bottom: 14px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; border-bottom: 1px solid var(--line); }
  .tabs button { flex: 0 0 auto; background: none; border: none; color: var(--muted);
    border-radius: 0; min-height: 44px; padding: 10px 14px; font-weight: 600;
    white-space: nowrap; border-bottom: 2px solid transparent; }
  .tabs button.on { color: var(--text); border-bottom-color: var(--accent); }
  .overview { line-height: 1.55; }
  .overview p { margin: 0 0 8px; } .overview p:last-child { margin: 0; }
  .overview strong { font-weight: 700; color: var(--text); }
  .overview ul, .overview ol { margin: 4px 0 8px; padding-left: 20px; }
  .stats { display: flex; justify-content: space-around; text-align: center; gap: 10px; }
  .stat { flex: 1; min-width: 0; }
  .stat + .stat { border-left: 1px solid var(--line); }
  .stat-v { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), #7aa2f7);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    overflow: hidden; text-overflow: ellipsis; }
  .stat-v.name { font-size: 18px; }
  .stat-sub { font-size: 12px; color: var(--muted); }
  .stat-l { font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.6px; margin-top: 4px; }
  .overview-head { display: flex; justify-content: space-between; align-items: center; }
  .overview-head h2 { margin: 0; }

  /* ---- crew strip (shows off the funny member icons) ---- */
  .crew { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding: 2px 0; margin: 0 -2px; }
  .crew-m { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
    gap: 6px; width: 68px; padding: 6px 2px; background: none; border: none; cursor: pointer;
    border-radius: 12px; min-height: 0; transition: background 0.15s ease, transform 0.1s ease; }
  .crew-m:hover { background: var(--hover-highlight); }
  .crew-m:active { transform: scale(0.95); }
  .crew-m .name { font-size: 12px; color: var(--muted); font-weight: 600; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .crew-m .av { animation: pop 0.35s ease both; }

  /* ---- animations ---- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: none; } }
  #tabbody > .card { animation: fadeUp 0.3s ease both; }
  #tabbody > .card:nth-child(2) { animation-delay: 0.06s; }
  #tabbody > .card:nth-child(3) { animation-delay: 0.12s; }
  .splitrow { animation: fadeUp 0.25s ease both; }
  .tabs button, .chip, .bal, .sug { transition: color 0.15s ease, border-color 0.15s ease, transform 0.1s ease; }
  .seg button { transition: background 0.18s ease, color 0.18s ease; }
  .exp { transition: opacity 0.2s ease; }

  /* ---- confirm modal ---- */
  .modal-ov { position: fixed; inset: 0; background: var(--overlay); display: flex;
    align-items: center; justify-content: center; padding: 20px; z-index: 100;
    opacity: 0; transition: opacity 0.18s ease; }
  .modal-ov.show { opacity: 1; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px; max-width: 360px; width: 100%; max-height: 86vh; overflow-y: auto;
    transform: translateY(14px) scale(0.97);
    transition: transform 0.2s cubic-bezier(.2,.8,.2,1); }
  .modal-ov.show .modal { transform: none; }
  .modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-msg { color: var(--muted); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  button.danger { background: var(--red); color: var(--btn-text); }
  /* notification settings rows */
  .notif-row { display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line);
    color: var(--text); font-size: 14px; text-align: left; }
  .notif-row:last-child { border-bottom: none; }
  .notif-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex: none; }
  .notif-cats.dim { opacity: 0.45; pointer-events: none; }
  .notif-lead { font-weight: 600; }
  button.danger:hover { background: #e0566f; color: #fff; }
  .modal.success { text-align: center; }
  .modal.success .modal-title { font-size: 19px; margin-bottom: 16px; }
  .modal.success .modal-actions { justify-content: center; }
  .modal.success .thumb { font-size: 60px; line-height: 1; margin-bottom: 10px;
    animation: thumbPop 0.6s cubic-bezier(.2,.9,.3,1.5) both, thumbBob 1.6s ease-in-out 0.6s infinite; }
  @keyframes thumbPop { 0% { transform: scale(0) rotate(-35deg); opacity: 0; }
    60% { transform: scale(1.25) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); } }
  @keyframes thumbBob { 0%,100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-6px) rotate(-6deg); } }

  /* ---- toast ---- */
  .toast { position: fixed; left: 50%; bottom: calc(22px + var(--safe-b));
    transform: translateX(-50%) translateY(20px); background: var(--accent); color: var(--btn-text);
    padding: 11px 20px; border-radius: 999px; font-weight: 600; z-index: 120; opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .toast.show { opacity: 1; transform: translateX(-50%); }

  /* ---- avatars (funny emoji per member) ---- */
  .av { display: inline-flex; align-items: center; justify-content: center; width: 32px;
    height: 32px; aspect-ratio: 1 / 1; border-radius: 50%; flex: 0 0 auto; line-height: 1;
    user-select: none; overflow: hidden; transition: transform 0.15s ease; }
  .av:hover { transform: scale(1.12) rotate(-6deg); }
  .splitrow .av { flex: 0 0 auto; }

  /* ---- analytics dashboard ---- */
  .analytics-grid { display: flex; flex-direction: column; gap: 16px; }
  .analytics-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .analytics-stats .astat { background: var(--card); border-radius: 14px; padding: 14px;
    text-align: center; border: 1px solid var(--line); }
  .astat .astat-v { font-size: 1.3rem; font-weight: 700; color: var(--text); }
  .astat .astat-l { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .astat .astat-icon { font-size: 1.4rem; margin-bottom: 4px; }

  /* donut chart */
  .donut-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .donut-svg { width: 160px; height: 160px; flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
  .donut-leg-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
  .donut-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .donut-leg-pct { color: var(--muted); margin-left: auto; }

  /* horizontal bars */
  .hbar-chart { display: flex; flex-direction: column; gap: 10px; }
  .hbar-row { display: flex; align-items: center; gap: 10px; }
  .hbar-label { min-width: 80px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
  .hbar-track { flex: 1; height: 24px; background: var(--hover-highlight); border-radius: 6px; overflow: hidden; position: relative; }
  .hbar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; display: flex; align-items: center; padding: 0 8px; }
  .hbar-val { font-size: 0.75rem; font-weight: 600; color: var(--bg); white-space: nowrap; }

  /* line chart */
  .line-chart-wrap { position: relative; overflow-x: auto; }
  .line-chart-svg { width: 100%; min-width: 300px; height: 180px; }
  .line-chart-svg text { fill: var(--muted); font-size: 11px; }
  .line-chart-svg .grid-line { stroke: var(--line); stroke-dasharray: 4 4; }
  .line-chart-svg .area-fill { opacity: 0.15; }
  .line-chart-svg .line-path { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .line-chart-svg .dot { r: 4; stroke-width: 2; }

  /* flow diagram */

<script>
const $ = (s, r=document) => r.querySelector(s);
const fmt = c => (c<0?'-':'') + '₹' + (Math.abs(c)/100).toFixed(2);

// ---- theme toggle (dark / light) ----
const THEME_ICONS = {
  dark: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
  light: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
};
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.querySelector('meta[name="theme-color"]').content = theme === 'light' ? '#f0f2f5' : '#0f1419';
  $('#themeIcon').innerHTML = THEME_ICONS[theme];
  localStorage.setItem('spliti-theme', theme);
}
(function initTheme() {
  const saved = localStorage.getItem('spliti-theme');
  applyTheme(saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
})();
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});

// ---- expense categories ----
const CATEGORIES = {
  chai:       { emoji: '🍵', label: 'Chai & Snacks', keywords: ['chai','tea','coffee','maggi','snacks','biscuit','chips','namkeen','samosa','pakora'] },
  meals:      { emoji: '🍽️', label: 'Meals', keywords: ['breakfast','lunch','dinner','dhaba','thali','momo','food','biryani','dal','roti','paratha'] },
  fuel:       { emoji: '⛽', label: 'Fuel', keywords: ['fuel','petrol','diesel','gas','filling'] },
  stay:       { emoji: '🏨', label: 'Stay', keywords: ['hotel','homestay','camp','tent','room','lodge','hostel','airbnb','resort','night stay'] },
  transport:  { emoji: '🚗', label: 'Transport', keywords: ['toll','parking','cab','taxi','bus','auto','rickshaw','bike','rental','ola','uber'] },
  activities: { emoji: '🎒', label: 'Activities', keywords: ['trek','rafting','ticket','entry','permit','paragliding','camping','safari','museum','temple'] },
  shopping:   { emoji: '🛒', label: 'Shopping', keywords: ['shopping','souvenir','clothes','gift','market','handicraft'] },
  essentials: { emoji: '💊', label: 'Essentials', keywords: ['medicine','pharmacy','recharge','sim','atm','laundry','repair','puncture','mechanic'] },
  drinks:     { emoji: '🍺', label: 'Drinks', keywords: ['beer','wine','whisky','rum','alcohol','bar','pub','old monk'] },
  tips:       { emoji: '💡', label: 'Tips & Misc', keywords: ['tip','donation','guide','porter'] },
  other:      { emoji: '📦', label: 'Other', keywords: [] },
};
function detectCategory(desc) {
  const lower = desc.toLowerCase();
  for (const [id, cat] of Object.entries(CATEGORIES)) {
    if (id === 'other') continue;
    if (cat.keywords.some(kw => lower.includes(kw))) return id;
  }
  return 'other';
}
function catEmoji(cat) { return (CATEGORIES[cat] || CATEGORIES.other).emoji; }

// ---- crisp inline SVG icons (FontAwesome/Lucide style, inherit currentColor) ----
const ICON_PATHS = {
  home: '<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h3.5v-5.5h5V21H18a1 1 0 0 0 1-1V9.5"/>',
  history: '<path d="M6 3h12a1 1 0 0 1 1 1v17l-3.2-2-3.4 2-3.4-2L5 21V4a1 1 0 0 1 1-1Z"/><path d="M9 8h6"/><path d="M9 12h5"/>',
  balance: '<path d="M12 3v18"/><path d="M7 21h10"/><path d="M5.5 7h13"/><path d="M5.5 7 2.5 13.5a3 3 0 0 0 6 0L5.5 7Z"/><path d="M18.5 7l-3 6.5a3 3 0 0 0 6 0L18.5 7Z"/>',
  refresh: '<path d="M21 12a9 9 0 1 1-2.6-6.3"/><path d="M21 3.5V9h-5.5"/>',
  close: '<path d="M18 6 6 18"/><path d="M6 6l12 12"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  pin: '<path d="M12 21s-6.5-5.3-6.5-10.5a6.5 6.5 0 0 1 13 0C18.5 15.7 12 21 12 21Z"/><circle cx="12" cy="10.5" r="2.4"/>',
  // sync-status icons
  cloudcheck: '<path d="M7 18h10a3.5 3.5 0 0 0 .5-6.97A5 5 0 0 0 8.6 9.2 4 4 0 0 0 7 18Z"/><path d="m9.5 13.5 1.8 1.8 3.2-3.2"/>',
  cloudoff: '<path d="M3 3l18 18"/><path d="M8.6 9.2A5 5 0 0 1 16.9 11.1 3.5 3.5 0 0 1 18.8 17M15.5 18H7a4 4 0 0 1-1.3-7.8"/>',
  chart: '<path d="M3 3v18h18"/><path d="M7 16l4-4 3 3 5-6"/>',
};
function icon(name, size=24) {
  return `<svg class="ic-svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" `
    + `stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" `
    + `aria-hidden="true">${ICON_PATHS[name]||''}</svg>`;
}
// SQLite stores UTC ("YYYY-MM-DD HH:MM:SS"); show it in IST.
const fmtDate = s => {
  if (!s) return '';
  const d = new Date(s.replace(' ', 'T') + 'Z');
  return isNaN(d) ? s : d.toLocaleString('en-IN',
    { timeZone:'Asia/Kolkata', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
};
// IST calendar-date key (YYYY-MM-DD) for grouping, and a short label from that key.
const istDateKey = s => {
  const d = new Date((s||'').replace(' ', 'T') + 'Z');
  return isNaN(d) ? '' : d.toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
};
const labelFromKey = k => {
  if (!k) return '—';
  const [y, m, dd] = k.split('-').map(Number);
  return new Date(y, m - 1, dd).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
};
const fmtTime = s => {
  const d = new Date((s || '').replace(' ', 'T') + 'Z');
  return isNaN(d) ? '' : d.toLocaleTimeString('en-IN',
    { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true });
};
const relDate = k => {
  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  const yest = new Date(Date.now() - 86400000).toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  return k === today ? 'Today' : k === yest ? 'Yesterday' : labelFromKey(k);
};

// ---- funny member avatars: deterministic emoji + color per name ----
const AV_COLORS = ['#f7768e','#e0af68','#9ece6a','#2ac3de','#7aa2f7','#bb9af7','#ff9e64','#73daca'];
const AV_EMOJI = ['🦊','🐼','🐧','🦁','🐸','🐵','🐙','🦄','🐶','🐯','🐨','🐮','🐷','🦝','🦘','🦔',
  '🐲','🦖','🐢','🦦','🐹','🐰','🐺','🦅','🦩','🐙','🦥','🐝','🦉','🐳'];
// FNV-ish hash so the same name always lands on the same emoji + colour
function nameHash(name) {
  let h = 0; for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return h;
}
function avColor(name) { return AV_COLORS[nameHash(name) % AV_COLORS.length]; }
function avEmoji(name) {
  // bias by a second hash so two names sharing a colour rarely share an emoji too
  const h = nameHash(name), h2 = (h ^ (h >>> 13)) >>> 0;
  return AV_EMOJI[h2 % AV_EMOJI.length];
}
function avatar(name, size) {
  const c = avColor(name || ''), sz = size || 28;
  return `<span class="av" title="${esc(name||'')}" style="width:${sz}px;height:${sz}px;`
    + `font-size:${Math.round(sz * 0.62)}px;background:${c}22;`
    + `box-shadow:inset 0 0 0 1.5px ${c}66, 0 1px 4px ${c}1f">${avEmoji(name)}</span>`;
}
let state = { groups: [], current: null, detail: null, chats: {}, overview: {} };

// ---- auth: send Basic credentials explicitly on every request. ----
// iOS home-screen PWAs don't share Safari's HTTP Basic Auth cache and don't
// reattach it to fetch/XHR, so we capture the login once and set the header
// ourselves (works the same everywhere). Token = base64("user:pass").
const AUTH_KEY = 'spliti_auth';
const ME_KEY = 'spliti_me';
let authToken = localStorage.getItem(AUTH_KEY) || null;
// Who is signed in: { member_id, name } — set once the name is verified as a
// group member. Used to record who adds an expense and to default "Paid by".
let me = (() => { try { return JSON.parse(localStorage.getItem(ME_KEY)) || null; } catch (_) { return null; } })();
let loginInFlight = null;

function authHeaders(h) {
  h = h || {};
  if (authToken) h['Authorization'] = 'Basic ' + authToken;
  return h;
}

function clearAuth() {
  authToken = null; me = null;
  localStorage.removeItem(AUTH_KEY); localStorage.removeItem(ME_KEY);
}

// Show the login overlay and resolve once a valid *member* is signed in.
// Validates name + password against /api/me, so non-members are rejected here.
// Concurrent 401s share a single prompt via loginInFlight.
function requestLogin(msg) {
  if (loginInFlight) return loginInFlight;
  loginInFlight = new Promise((resolve) => {
    const ov = document.createElement('div');
    ov.className = 'modal-ov';
    ov.innerHTML = `<div class="modal">
      <div class="modal-title">Sign in to Spliti</div>
      <div class="modal-msg">${msg || 'Enter your name and the trip password.'}</div>
      <input id="lg-user" type="text" placeholder="Your name" autocomplete="username" style="width:100%;margin-bottom:10px" />
      <input id="lg-pass" type="password" placeholder="Trip password" autocomplete="current-password" style="width:100%;margin-bottom:8px" />
      <div class="modal-msg" id="lg-err" style="color:var(--red);display:none;margin-bottom:10px"></div>
      <div class="modal-actions"><button data-act="go">Sign in</button></div>
    </div>`;
    document.body.appendChild(ov);
    requestAnimationFrame(() => ov.classList.add('show'));
    const user = ov.querySelector('#lg-user');
    const pass = ov.querySelector('#lg-pass');
    const err = ov.querySelector('#lg-err');
    if (me && me.name) user.value = me.name;
    setTimeout(() => (user.value ? pass : user).focus(), 60);
    const showErr = (t) => { err.textContent = t; err.style.display = 'block'; };
    const submit = async () => {
      const u = user.value.trim();
      const p = pass.value;
      if (!u) { showErr('Enter your name.'); user.focus(); return; }
      if (!p) { pass.focus(); return; }
      // base64 of "name:password", unicode-safe.
      const token = btoa(unescape(encodeURIComponent(u + ':' + p)));
      let r;
      try { r = await fetch('/api/me', { headers: { Authorization: 'Basic ' + token } }); }
      catch (_) {
        // Offline: don't block sign-in. If we have cached data and the name matches
        // a known member, let them in optimistically; the credentials get validated
        // on the next online request (a wrong password will re-prompt then).
        const g = lastGid(), snap = g ? loadSnapshot(g) : null;
        const mem = snap && snap.members.find(m => (m.name || '').toLowerCase() === u.toLowerCase());
        if (mem) {
          authToken = token;
          me = { member_id: mem.id, name: mem.name, group_id: snap.group.id };
          localStorage.setItem(AUTH_KEY, token);
          localStorage.setItem(ME_KEY, JSON.stringify(me));
          ov.classList.remove('show'); setTimeout(() => ov.remove(), 200);
          loginInFlight = null; resolve(true);
          return;
        }
        showErr('You’re offline — connect once to sign in the first time.');
        return;
      }
      if (r.status === 401) { showErr('Wrong password — try again.'); pass.value = ''; pass.focus(); return; }
      if (r.status === 403) {
        const t = await r.json().catch(() => ({}));
        showErr(t.detail || 'That name isn’t in the group.'); user.focus();
        return;
      }
      if (!r.ok) { showErr('Couldn’t sign in — try again.'); return; }
      authToken = token;
      me = await r.json();
      localStorage.setItem(AUTH_KEY, token);
      localStorage.setItem(ME_KEY, JSON.stringify(me));
      ov.classList.remove('show');
      setTimeout(() => ov.remove(), 200);
      loginInFlight = null;
      resolve(true);
    };
    ov.querySelector('[data-act=go]').onclick = submit;
    [user, pass].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); }));
  });
  return loginInFlight;
}

// Guarantee a signed-in member before loading data. Validates any stored token
// (it may predate member checks, or the name may have been removed).
async function ensureAuth() {
  if (authToken) {
    try {
      const r = await fetch('/api/me', { headers: authHeaders({}) });
      if (r.ok) { me = await r.json(); localStorage.setItem(ME_KEY, JSON.stringify(me)); return; }
    } catch (_) { return; }  // offline: keep going with the cached shell
    clearAuth();
  }
  await requestLogin();
}

// fetch wrapper: attach auth, and on 401 prompt for login then retry once.
async function fetchAuthed(url, opt) {
  opt = opt || {};
  opt.headers = authHeaders(opt.headers || {});
  let r = await fetch(url, opt);
  if (r.status === 401) {
    clearAuth();
    await requestLogin();
    opt.headers = authHeaders(opt.headers);
    r = await fetch(url, opt);
  }
  return r;
}

async function api(method, path, body) {
  const opt = { method, headers: {} };
  if (body !== undefined) { opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetchAuthed('/api' + path, opt);
  if (!r.ok) { const t = await r.json().catch(()=>({detail:r.statusText})); throw new Error(t.detail||'error'); }
  return r.json();
}

// ============================================================================
//  Offline support — read from a local snapshot, queue writes, sync on reconnect
// ============================================================================
// The app stays fully usable with no network: the last server state is cached in
// localStorage and rendered instantly, writes are applied optimistically and
// parked in an "outbox", then replayed once the connection returns. Each queued
// write carries a client_id so the replay is idempotent server-side (exactly-once
// effect). Balances are recomputed locally — a JS mirror of spliti/balances.py —
// so offline edits reflect immediately.

const SNAP_PREFIX = 'spliti_snap_';
const LAST_GID_KEY = 'spliti_last_gid';
const OUTBOX_KEY = 'spliti_outbox';

const uuid = () => (crypto.randomUUID
  ? crypto.randomUUID()
  : 'c-' + Date.now().toString(36) + '-' + Math.random().toString(16).slice(2));

const readOutbox = () => { try { return JSON.parse(localStorage.getItem(OUTBOX_KEY)) || []; } catch (_) { return []; } };
let outbox = readOutbox();
const pendingCount = () => outbox.length;
function saveOutbox() {
  try { localStorage.setItem(OUTBOX_KEY, JSON.stringify(outbox)); } catch (_) {}
  updateNetBadge();
}
// Another instance (a second tab / browser sharing this device) changed the queue:
// adopt it so we don't overwrite each other's pending writes. Skipped mid-flush to
// avoid yanking the op we're currently sending.
window.addEventListener('storage', e => {
  if (e.key === OUTBOX_KEY && !flushing) { outbox = readOutbox(); updateNetBadge(); }
});

const snapKey = gid => SNAP_PREFIX + gid;
function saveSnapshot() {
  if (!state.detail || !state.current) return;
  try {
    localStorage.setItem(snapKey(state.current), JSON.stringify(state.detail));
    localStorage.setItem(LAST_GID_KEY, String(state.current));
  } catch (_) {}
}
function loadSnapshot(gid) { try { return JSON.parse(localStorage.getItem(snapKey(gid))); } catch (_) { return null; } }
const lastGid = () => { const v = localStorage.getItem(LAST_GID_KEY); return v ? +v : null; };

// ---- local balance math (mirror of balances.py) ----
function splitEqually(amountPaise, ids) {
  const n = ids.length, base = Math.floor(amountPaise / n), rem = amountPaise - base * n;
  const out = {}; ids.forEach((id, i) => { out[id] = base + (i < rem ? 1 : 0); });
  return out;
}
function suggestSettlements(bal) {
  const creditors = Object.entries(bal).map(([m, b]) => [+m, b]).filter(x => x[1] > 0).sort((a, b) => b[1] - a[1]);
  const debtors = Object.entries(bal).map(([m, b]) => [+m, -b]).filter(x => x[1] > 0).sort((a, b) => b[1] - a[1]);
  const out = []; let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const pay = Math.min(debtors[i][1], creditors[j][1]);
    out.push({ from: debtors[i][0], to: creditors[j][0], amount_paise: pay });
    debtors[i][1] -= pay; creditors[j][1] -= pay;
    if (debtors[i][1] === 0) i++;
    if (creditors[j][1] === 0) j++;
  }
  return out;
}
function recomputeDetail(d) {
  const memberIds = d.members.map(m => m.id);
  const nameOf = {}; d.members.forEach(m => { nameOf[m.id] = m.name; });
  const bal = {}; memberIds.forEach(m => { bal[m] = 0; });
  d.expenses.filter(e => !e.deleted).forEach(e => {
    if (e.paid_by in bal) bal[e.paid_by] += e.amount_paise;
    (e.shares || []).forEach(s => { if (s.member_id in bal) bal[s.member_id] -= s.share_paise; });
  });
  d.settlements.forEach(st => {
    if (st.from_member in bal) bal[st.from_member] += st.amount_paise;
    if (st.to_member in bal) bal[st.to_member] -= st.amount_paise;
  });
  d.balances = memberIds.map(m => ({ member_id: m, name: nameOf[m], net_paise: bal[m] }));
  d.suggestions = suggestSettlements(bal).map(s => ({ ...s, from_name: nameOf[s.from], to_name: nameOf[s.to] }));
}

const nowUtc = () => new Date().toISOString().slice(0, 19).replace('T', ' ');  // SQLite-style UTC

// A cheap fingerprint of the data we render, so a periodic background pull only
// re-renders (and disrupts the open tab) when something actually changed — e.g.
// another member added an expense.
function detailSig(d) {
  if (!d) return '';
  return JSON.stringify({
    e: d.expenses.map(x => [x.id, x.amount_paise, x.deleted ? 1 : 0]),
    s: d.settlements.map(x => [x.id, x.amount_paise]),
    m: d.members.map(x => [x.id, x.name]),
  });
}

// ---- optimistic local mutations (until the server confirms) ----
function localAddExpense(d, op) {
  const b = op.body, nameOf = {}; d.members.forEach(m => { nameOf[m.id] = m.name; });
  const amountPaise = Math.round(b.amount * 100);
  let shareMap;
  if (b.split_type === 'exact') { shareMap = {}; for (const [m, a] of Object.entries(b.shares)) shareMap[+m] = Math.round(a * 100); }
  else { shareMap = splitEqually(amountPaise, b.members || d.members.map(m => m.id)); }
  d.expenses.unshift({
    id: op.client_id, client_id: op.client_id, description: b.description, amount_paise: amountPaise,
    paid_by: b.paid_by, paid_by_name: nameOf[b.paid_by],
    added_by: (me && me.member_id) || null, added_by_name: (me && me.name) || null,
    created_at: nowUtc(), deleted: false, deleted_at: null, pending: true,
    shares: Object.entries(shareMap).map(([m, c]) => ({ member_id: +m, name: nameOf[+m], share_paise: c })),
  });
  recomputeDetail(d);
}
function localAddSettlement(d, op) {
  const b = op.body, nameOf = {}; d.members.forEach(m => { nameOf[m.id] = m.name; });
  d.settlements.unshift({
    id: op.client_id, client_id: op.client_id, from_member: b.from_member, to_member: b.to_member,
    from_name: nameOf[b.from_member], to_name: nameOf[b.to_member],
    amount_paise: Math.round(b.amount * 100), created_at: nowUtc(), pending: true,
  });
  recomputeDetail(d);
}
function localSetDeleted(d, eid, deleted) {
  const e = d.expenses.find(x => String(x.id) === String(eid));
  if (e) { e.deleted = deleted; e.deleted_at = deleted ? nowUtc() : null; recomputeDetail(d); }
}

// Queue a write: apply locally, persist, re-render, then try to push it.
function queueMutation(op, applyFn) {
  op.client_id = op.client_id || uuid();
  if (op.body) op.body.client_id = op.client_id;   // server-side dedup key
  applyFn(state.detail, op);
  saveSnapshot();
  // Re-read first so a write queued by another instance isn't clobbered when we
  // persist (the in-memory copy may be stale). Not done mid-flush.
  if (!flushing) outbox = readOutbox();
  outbox.push(op); saveOutbox();
  renderMain();
  flush();
}

// ---- sync engine ----
function specForOp(op) {
  if (op.kind === 'expense') return ['POST', '/groups/' + op.gid + '/expenses', op.body];
  if (op.kind === 'settlement') return ['POST', '/groups/' + op.gid + '/settlements', op.body];
  if (op.kind === 'delete') return ['DELETE', '/groups/' + op.gid + '/expenses/' + op.eid, undefined];
  if (op.kind === 'restore') return ['POST', '/groups/' + op.gid + '/expenses/' + op.eid + '/restore', undefined];
  return null;
}
async function sendOp(op) {
  const spec = specForOp(op); if (!spec) return;
  const [method, path, body] = spec;
  const opt = { method, headers: {} };
  if (body !== undefined) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  let r;
  try { r = await fetchAuthed('/api' + path, opt); }
  catch (_) { const e = new Error('offline'); e.retriable = true; throw e; }   // network down — retry later
  if (r.ok || r.status === 404) return;  // 404 = row already gone; treat as applied
  const t = await r.json().catch(() => ({}));
  const e = new Error(t.detail || ('HTTP ' + r.status));
  // 5xx / server failure is transient: keep the write queued and retry — never drop it.
  // Only a genuine client rejection (4xx) is permanent and safe to discard.
  e.retriable = r.status >= 500;
  throw e;
}

let flushing = false;
async function flush() {
  // Only the overlap guard blocks here — we deliberately don't gate on
  // navigator.onLine. It's unreliable (can stay false after a real reconnect,
  // and the 'online' event doesn't always fire), so we just attempt the network
  // and let a failure mean "still offline". This is what makes a reconnect
  // actually pull fresh data.
  if (flushing) { updateNetBadge(); return; }
  flushing = true;
  updateNetBadge();
  try {
    while (outbox.length) {
      const op = outbox[0];
      try { await sendOp(op); }
      catch (e) {
        // Transient (offline / 5xx): stop and keep the whole queue intact so no
        // write is ever lost — we retry on the next tick, focus, or online event.
        if (e.retriable) break;
        // Permanent client rejection (4xx): drop just this op so it can't wedge
        // the queue forever; the rest still sync.
        console.warn('[sync] dropping rejected write', op, e.message);
        toast('A queued change was rejected: ' + e.message);
      }
      outbox.shift(); saveOutbox();
    }
    // Caught up: pull canonical server state (real ids, timestamps, and anything
    // other members added). Attempt regardless of navigator.onLine; a network
    // failure just means we're still offline and we keep the cached state. Only
    // re-render when it actually changed, so the background pull doesn't disrupt
    // the open tab.
    if (!outbox.length && state.current) {
      try {
        const fresh = await api('GET', '/current');
        const changed = detailSig(fresh) !== detailSig(state.detail);
        state.detail = fresh; state.current = fresh.group.id;
        saveSnapshot();
        if (changed) { delete state.overview[state.current]; renderMain(); }
      } catch (_) { /* still offline — keep showing cached/optimistic state */ }
    }
  } finally { flushing = false; updateNetBadge(); }
}

// ---- sync-status icon in the header ----
// ok = everything synced · busy = syncing/queued (online) · off = offline (changes
// are saved locally and will sync when the connection returns).
function updateNetBadge() {
  const el = $('#netBadge'); if (!el) return;
  const off = !navigator.onLine, pend = pendingCount();
  let cls, ic, spin = false, title;
  if (off) {
    cls = 'off'; ic = 'cloudoff';
    title = pend ? `Offline — ${pend} change${pend > 1 ? 's' : ''} saved on this device` : 'Offline — showing saved data';
  } else if (pend || flushing) {
    cls = 'busy'; ic = 'refresh'; spin = true;
    title = pend ? `Syncing ${pend} change${pend > 1 ? 's' : ''}…` : 'Syncing…';
  } else {
    cls = 'ok'; ic = 'cloudcheck'; title = 'All changes synced';
  }
  el.className = 'syncbtn ' + cls;
  el.title = title; el.setAttribute('aria-label', title);
  el.innerHTML = icon(ic, 19) + (off && pend ? `<span class="cnt">${pend}</span>` : '');
  if (spin) el.querySelector('.ic-svg')?.classList.add('spin');
}
window.addEventListener('online', () => {
  updateNetBadge();
  // Drop offline AI placeholders so the summary regenerates when next viewed.
  Object.keys(state.overview).forEach(g => { if (state.overview[g] && state.overview[g].offline) delete state.overview[g]; });
  flush();
  if (activeTab === 'overview' && state.current) ensureOverview(state.current);
});
window.addEventListener('offline', updateNetBadge);

async function loadCurrent() {
  const gid = (me && me.group_id) || lastGid();
  const snap = gid ? loadSnapshot(gid) : null;

  // Returning user with cached identity + data: render instantly, never block on
  // the network or a login prompt. Then sync in the background.
  if (authToken && me && snap) {
    state.detail = snap; state.current = snap.group.id;
    recomputeDetail(state.detail);
    renderMain();
    flush();
    return;
  }

  // First run / no cache: we need the network. Fall back to any snapshot if offline.
  try {
    await ensureAuth();
    state.detail = await api('GET', '/current');
    state.current = state.detail.group.id;
    saveSnapshot();
    renderMain();
    flush();
  } catch (e) {
    if (snap) { state.detail = snap; state.current = snap.group.id; recomputeDetail(state.detail); renderMain(); return; }
    $('#main').innerHTML = '<div class="empty">Couldn’t load. <a href="#" id="retry">Retry</a></div>';
    const r = $('#retry');
    if (r) r.onclick = ev => { ev.preventDefault(); $('#main').innerHTML = '<div class="empty">Loading…</div>'; loadCurrent(); };
  }
}

function esc(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function confirmAction(opts) {
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'modal-ov';
    ov.innerHTML = `<div class="modal">
      <div class="modal-title">${esc(opts.title || 'Are you sure?')}</div>
      <div class="modal-msg">${esc(opts.message || '')}</div>
      <div class="modal-actions">
        <button class="ghost" data-act="cancel">Cancel</button>
        <button class="${opts.danger?'danger':''}" data-act="ok">${esc(opts.ok || 'Confirm')}</button>
      </div></div>`;
    document.body.appendChild(ov);
    requestAnimationFrame(() => ov.classList.add('show'));
    const close = val => { ov.classList.remove('show'); setTimeout(() => ov.remove(), 200); resolve(val); };
    ov.querySelector('[data-act=cancel]').onclick = () => close(false);
    ov.querySelector('[data-act=ok]').onclick = () => close(true);
    ov.onclick = e => { if (e.target === ov) close(false); };
    document.addEventListener('keydown', function esc2(e){ if(e.key==='Escape'){ close(false); document.removeEventListener('keydown', esc2);} });
  });
}

function settlementModal(d) {
  if (d.members.length < 2) { toast('Need at least two members'); return; }
  const opts = d.members.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  const ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.innerHTML = `<div class="modal">
    <div class="modal-title">Manual settlement</div>
    <div class="modal-msg">Record a payment one member made to another offline.</div>
    <div class="fields" style="gap:10px;text-align:left">
      <div><label>From (payer)</label><select id="stFrom">${opts}</select></div>
      <div><label>To (receiver)</label><select id="stTo">${opts}</select></div>
      <div><label>Amount</label><input id="stAmt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" /></div>
    </div>
    <div class="err" id="stErr"></div>
    <div class="modal-actions">
      <button class="ghost" data-act="cancel">Cancel</button>
      <button data-act="ok">Record</button>
    </div></div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(() => ov.classList.add('show'));
  const fromSel = ov.querySelector('#stFrom'), toSel = ov.querySelector('#stTo');
  toSel.value = String(d.members[1].id);  // default payer != receiver
  // payer cannot be the receiver: disable the partner's choice in each dropdown
  const sync = () => {
    [...toSel.options].forEach(o => o.disabled = o.value === fromSel.value);
    [...fromSel.options].forEach(o => o.disabled = o.value === toSel.value);
  };
  fromSel.onchange = () => {
    if (toSel.value === fromSel.value) {
      const other = [...toSel.options].find(o => o.value !== fromSel.value);
      if (other) toSel.value = other.value;
    }
    sync();
  };
  toSel.onchange = () => {
    if (fromSel.value === toSel.value) {
      const other = [...fromSel.options].find(o => o.value !== toSel.value);
      if (other) fromSel.value = other.value;
    }
    sync();
  };
  sync();
  const close = () => { ov.classList.remove('show'); setTimeout(() => ov.remove(), 200); };
  ov.querySelector('[data-act=cancel]').onclick = close;
  ov.onclick = e => { if (e.target === ov) close(); };
  ov.querySelector('[data-act=ok]').onclick = async () => {
    const from = +ov.querySelector('#stFrom').value;
    const to = +ov.querySelector('#stTo').value;
    const amt = parseFloat(ov.querySelector('#stAmt').value);
    const errEl = ov.querySelector('#stErr'); errEl.textContent = '';
    if (from === to) { errEl.textContent = 'Payer and receiver must differ.'; return; }
    if (!(amt > 0)) { errEl.textContent = 'Enter a valid amount.'; return; }
    queueMutation(
      { kind: 'settlement', gid: d.group.id, body: { from_member: from, to_member: to, amount: amt } },
      localAddSettlement,
    );
    close(); toast('Settlement recorded');
  };
}

// Count-up "ticker" for money figures: eases from 0 to the target paise.
const reduceMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function animateCount(el) {
  const target = +el.dataset.count || 0;
  if (reduceMotion() || !target) { el.textContent = fmt(target); return; }
  const dur = 780, start = performance.now(), ease = t => 1 - Math.pow(1 - t, 3);
  (function step(now) {
    const p = Math.min(1, (now - start) / dur);
    el.textContent = fmt(Math.round(target * ease(p)));
    if (p < 1) requestAnimationFrame(step);
  })(start);
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 1700);
}

const TABS = [
  ['overview','Overview','home'],
  ['history','History','history'],
  ['analytics','Analytics','chart'],
  ['balance','Balance','balance'],
];
let activeTab = localStorage.getItem('split.tab') || 'overview';

function renderMain() {
  const d = state.detail; if (!d) return;
  if (!TABS.some(t => t[0] === activeTab)) activeTab = 'overview';
  $('#main').innerHTML = `<div id="tabbody"></div>
    <button class="fab" id="fab" aria-label="Add expense"><svg class="plus" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg></button>
    <nav class="bottomnav" id="tabs">
      ${TABS.map(([k,label,ic])=>`<button data-tab="${k}" class="${activeTab===k?'on':''}"><span class="ic">${icon(ic,23)}</span><span class="lb">${label}</span></button>`).join('')}
    </nav>`;
  $('#tabs').querySelectorAll('button').forEach(b => b.onclick = () => {
    if (activeTab === b.dataset.tab) return;
    activeTab = b.dataset.tab; localStorage.setItem('split.tab', activeTab);
    $('#tabs').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    renderTab();
  });
  $('#fab').onclick = openExpenseModal;
  renderTab();
}

function renderTab() {
  const d = state.detail, body = $('#tabbody'); if (!body) return;
  body.innerHTML = ({
    overview: overviewSection,
    history: () => historySection(d),
    analytics: () => analyticsSection(d),
    balance: () => balanceSection(d),
  }[activeTab] || overviewSection)();
  wireTab();
}

function overviewSection() {
  const d = state.detail;
  const active = d.expenses.filter(e => !e.deleted);
  const total = active.reduce((s, e) => s + e.amount_paise, 0);
  const todayKey = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  const spentToday = active.filter(e => istDateKey(e.created_at) === todayKey)
    .reduce((s, e) => s + e.amount_paise, 0);

  // Category breakdown
  const byCat = {};
  active.forEach(e => {
    const cat = e.category || 'other';
    byCat[cat] = (byCat[cat] || 0) + e.amount_paise;
  });
  const catBreakdown = Object.entries(byCat)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) => {
      const pct = total > 0 ? Math.round(amt / total * 100) : 0;
      return `<div class="cat-stat"><span class="cat-emoji">${catEmoji(cat)}</span>${fmt(amt)} <span class="cat-pct">(${pct}%)</span></div>`;
    }).join('');

  return `
    <div class="card stats">
      <div class="stat"><div class="stat-v" data-count="${total}">${fmt(0)}</div><div class="stat-l">Total spent</div></div>
      <div class="stat"><div class="stat-v" data-count="${spentToday}">${fmt(0)}</div><div class="stat-l">Spent today</div></div>
    </div>
    ${active.length ? `<div class="card">
      <h2>Spending by category</h2>
      <div class="cat-breakdown">${catBreakdown}</div>
    </div>` : ''}
    <div class="card">
      <h2>The crew</h2>
      <div class="crew">${d.members.map(m=>`
        <button class="crew-m" data-mid="${m.id}">${avatar(m.name,42)}<span class="name">${esc(m.name)}</span></button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="overview-head"><h2>Overview</h2><button class="ghost sm icon-btn" id="ovRefresh" title="Regenerate">${icon('refresh',16)}</button></div>

function expenseFormHtml(d) {

  const catChips = Object.entries(CATEGORIES).map(([id, c]) =>
    `<button type="button" class="cat-chip${id==='other'?' on':''}" data-cat="${id}"><span class="cat-emoji">${c.emoji}</span>${c.label}</button>`

      <div><label>Paid by</label><select id="ePaidBy">${memberOpts}</select></div>

}

let expenseModalEl = null;
function closeExpenseModal() {
  const ov = expenseModalEl; expenseModalEl = null;
  if (ov) { ov.classList.remove('show'); setTimeout(() => ov.remove(), 200); }
}
function openExpenseModal() {
  const d = state.detail;
  if (!d || !d.members.length) { toast('No members in this group'); return; }
  const ov = document.createElement('div');
  ov.className = 'modal-ov';
  ov.innerHTML = `<div class="modal expense-modal">
    <div class="modal-title">${icon('plus',19)} Add expense</div>
    <div class="loc-chip" id="locChip" hidden></div>
    ${expenseFormHtml(d)}
    <div class="modal-actions">
      <button class="ghost" data-act="cancel">Cancel</button>
      <button id="addExpense">Add expense</button>
    </div></div>`;
  document.body.appendChild(ov);
  expenseModalEl = ov;
  requestAnimationFrame(() => ov.classList.add('show'));
  ov.querySelector('[data-act=cancel]').onclick = closeExpenseModal;
  ov.onclick = e => { if (e.target === ov) closeExpenseModal(); };
  document.addEventListener('keydown', function onEsc(e){
    if (e.key === 'Escape') { closeExpenseModal(); document.removeEventListener('keydown', onEsc); }
  });
  wireExpenseForm(d);
}

function wireExpenseForm(d) {
  const pb = $('#ePaidBy');
  const key = 'split.paidBy.' + d.group.id;
  const saved = localStorage.getItem(key);
  // Default the payer to whoever is signed in; a saved choice still wins.
  if (me && [...pb.options].some(o => o.value === String(me.member_id))) pb.value = String(me.member_id);
  if (saved && [...pb.options].some(o => o.value === saved)) pb.value = saved;
  pb.onchange = () => localStorage.setItem(key, pb.value);
  renderSplitArea();
  $('#seg').querySelectorAll('button').forEach(b => b.onclick = () => {
    splitType = b.dataset.t;
    $('#seg').querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
    renderSplitArea();
  });
  // Category chips
  const catChips = $('#catChips');
  function selectCat(catId) {
    $('#eCat').value = catId;
    catChips.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('on', c.dataset.cat === catId));
  }
  catChips.querySelectorAll('.cat-chip').forEach(c => c.onclick = () => selectCat(c.dataset.cat));
  // Auto-detect category from description
  let userPickedCat = false;
  catChips.querySelectorAll('.cat-chip').forEach(c => {
    const orig = c.onclick;
    c.onclick = () => { userPickedCat = true; selectCat(c.dataset.cat); };
  });
  $('#eDesc').addEventListener('input', () => {
    if (userPickedCat) return;
    const detected = detectCategory($('#eDesc').value);
    selectCat(detected);
  });
  $('#addExpense').onclick = addExpense;
  $('#eAmt').addEventListener('input', () => { if (splitType === 'exact') renderSplitArea(); });
  $('#eDesc').focus();
  fillDescSuggestion();
}

// ---- Analytics Dashboard ----
const CHART_COLORS = ['#7aa2f7','#f7768e','#9ece6a','#e0af68','#2ac3de','#bb9af7','#ff9e64','#73daca','#c0caf5','#db4b4b','#449dab'];

function analyticsSection(d) {
  const active = d.expenses.filter(e => !e.deleted);
  const total = active.reduce((s, e) => s + e.amount_paise, 0);
  const members = d.members;
  const perPerson = members.length ? Math.round(total / members.length) : 0;

  // Trip duration
  const dates = active.map(e => new Date((e.created_at||'').replace(' ','T')+'Z')).filter(d => !isNaN(d));
  const firstDate = dates.length ? new Date(Math.min(...dates)) : null;
  const lastDate = dates.length ? new Date(Math.max(...dates)) : null;
  const tripDays = firstDate && lastDate ? Math.max(1, Math.round((lastDate - firstDate) / 86400000) + 1) : 0;

  // Most used category
  const byCat = {};
  active.forEach(e => { const c = e.category || 'other'; byCat[c] = (byCat[c]||0) + 1; });
  const topCat = Object.entries(byCat).sort((a,b) => b[1]-a[1])[0];
  const topCatLabel = topCat ? `${catEmoji(topCat[0])} ${(CATEGORIES[topCat[0]]||CATEGORIES.other).label}` : '—';

  return `<div class="analytics-grid">
    ${summaryCards(total, perPerson, tripDays, topCatLabel)}
    ${donutChart(active, total)}
    ${memberBars(active, members)}
    ${dailyTrend(active)}
    ${flowDiagram(d.suggestions)}
    ${topExpenses(active)}
    ${fairnessChart(active, members, perPerson)}
  </div>`;
}

function summaryCards(total, perPerson, tripDays, topCat) {
  return `<div class="analytics-stats">
    <div class="astat"><div class="astat-icon">💰</div><div class="astat-v">${fmt(total)}</div><div class="astat-l">Total Trip Cost</div></div>
    <div class="astat"><div class="astat-icon">👥</div><div class="astat-v">${fmt(perPerson)}</div><div class="astat-l">Per Person Avg</div></div>
    <div class="astat"><div class="astat-icon">📅</div><div class="astat-v">${tripDays} day${tripDays!==1?'s':''}</div><div class="astat-l">Trip Duration</div></div>
    <div class="astat"><div class="astat-icon">🏷️</div><div class="astat-v" style="font-size:1rem">${topCat}</div><div class="astat-l">Top Category</div></div>
  </div>`;
}

function donutChart(active, total) {
  if (!active.length) return '';
  const byCat = {};
  active.forEach(e => { const c = e.category || 'other'; byCat[c] = (byCat[c]||0) + e.amount_paise; });
  const sorted = Object.entries(byCat).sort((a,b) => b[1]-a[1]);

  const cx = 80, cy = 80, r = 64, ir = 38;
  let cumAngle = -Math.PI/2;
  const arcs = sorted.map(([cat, amt], i) => {
    const frac = total > 0 ? amt / total : 0;
    const angle = frac * 2 * Math.PI;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const ix1 = cx + ir * Math.cos(endAngle), iy1 = cy + ir * Math.sin(endAngle);
    const ix2 = cx + ir * Math.cos(startAngle), iy2 = cy + ir * Math.sin(startAngle);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const path = sorted.length === 1
      ? `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/><circle cx="${cx}" cy="${cy}" r="${ir}" fill="var(--card)"/>`
      : `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${largeArc},0 ${ix2},${iy2} Z" fill="${color}"/>`;
    return { path, color, cat, amt, pct: Math.round(frac * 100) };
  });

  const legend = arcs.map(a =>
    `<div class="donut-leg-item"><span class="donut-swatch" style="background:${a.color}"></span>${catEmoji(a.cat)} ${(CATEGORIES[a.cat]||CATEGORIES.other).label}<span class="donut-leg-pct">${a.pct}%</span></div>`
  ).join('');

  return `<div class="card">
    <h2>Spending by Category</h2>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 160 160">${arcs.map(a=>a.path).join('')}</svg>
      <div class="donut-legend">${legend}</div>
    </div>
  </div>`;
}

function memberBars(active, members) {
  if (!active.length) return '';
  const byMember = {};
  members.forEach(m => { byMember[m.name] = 0; });
  active.forEach(e => { byMember[e.paid_by_name] = (byMember[e.paid_by_name]||0) + e.amount_paise; });
  const sorted = Object.entries(byMember).sort((a,b) => b[1]-a[1]);
  const max = Math.max(1, sorted[0][1]);

  const bars = sorted.map(([name, amt], i) => {
    const pct = Math.round(amt / max * 100);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    return `<div class="hbar-row">
      <div class="hbar-label">${avatar(name,22)}<span>${esc(name)}</span></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}"><span class="hbar-val">${fmt(amt)}</span></div></div>
    </div>`;
  }).join('');

  return `<div class="card"><h2>Who's Spending Most</h2><div class="hbar-chart">${bars}</div></div>`;
}

function dailyTrend(active) {
  if (active.length < 2) return '';
  const byDay = {};
  active.forEach(e => {
    const k = istDateKey(e.created_at);
    if (k) byDay[k] = (byDay[k]||0) + e.amount_paise;
  });
  const days = Object.keys(byDay).sort();
  if (days.length < 2) return '';
  const vals = days.map(k => byDay[k]);
  const maxVal = Math.max(...vals);

  const pad = { l: 50, r: 15, t: 15, b: 30 };
  const w = Math.max(300, days.length * 60);
  const h = 180;
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  const pts = days.map((k, i) => ({
    x: pad.l + (i / (days.length - 1)) * cw,
    y: pad.t + ch - (vals[i] / maxVal) * ch,
    label: labelFromKey(k),
    val: vals[i]
  }));

  const linePath = pts.map((p, i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('');
  const areaPath = linePath + `L${pts[pts.length-1].x.toFixed(1)},${pad.t+ch}L${pts[0].x.toFixed(1)},${pad.t+ch}Z`;

  // Grid lines
  const gridCount = 4;
  const gridLines = Array.from({length: gridCount+1}, (_, i) => {
    const y = pad.t + (i / gridCount) * ch;
    const v = maxVal - (i / gridCount) * maxVal;
    return `<line class="grid-line" x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}"/>
      <text x="${pad.l-6}" y="${y+4}" text-anchor="end">${fmt(v)}</text>`;
  }).join('');

  const dots = pts.map(p =>
    `<circle class="dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" fill="var(--accent)" stroke="var(--card)"/>`
  ).join('');
  const labels = pts.map(p =>
    `<text x="${p.x.toFixed(1)}" y="${h - 6}" text-anchor="middle">${p.label}</text>`
  ).join('');

  return `<div class="card"><h2>Daily Spending Trend</h2>
    <div class="line-chart-wrap">
      <svg class="line-chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMinYMin meet">
        ${gridLines}
        <path class="area-fill" d="${areaPath}" fill="var(--accent)"/>
        <path class="line-path" d="${linePath}" stroke="var(--accent)"/>
        ${dots}${labels}
      </svg>
    </div>
  </div>`;
}

function flowDiagram(suggestions) {
  if (!suggestions || !suggestions.length) return `<div class="card"><h2>Settlement Flow</h2><div class="muted">All settled up ✦</div></div>`;
  const maxAmt = Math.max(1, ...suggestions.map(s => s.amount_paise));
  const flows = suggestions.map((s, i) => {
    const pct = Math.round(s.amount_paise / maxAmt * 100);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    return `<div class="flow-row">
      <div class="flow-from">${avatar(s.from_name,22)}<span>${esc(s.from_name)}</span></div>
      <div class="flow-arrow">
        <div class="flow-arrow-amt" style="color:${color}">${fmt(s.amount_paise)}</div>
        <div class="flow-arrow-bar" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="flow-to"><span>${esc(s.to_name)}</span>${avatar(s.to_name,22)}</div>
    </div>`;
  }).join('');
  return `<div class="card"><h2>Settlement Flow</h2><p class="hint-line">Who pays whom to settle up</p><div class="flow-wrap">${flows}</div></div>`;
}

function topExpenses(active) {

  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const items = top5.map((e, i) =>
    `<div class="top-item">

      <span class="top-amt">${fmt(e.amount_paise)}</span>
    </div>`
  ).join('');
  return `<div class="card"><h2>Top Expenses</h2><div class="top-list">${items}</div></div>`;
}

function fairnessChart(active, members, perPerson) {
  if (!members.length || !active.length) return '';
  // Calculate how much each person actually paid vs fair share
  const paid = {};
  members.forEach(m => { paid[m.name] = 0; });
  active.forEach(e => { paid[e.paid_by_name] = (paid[e.paid_by_name]||0) + e.amount_paise; });
  const entries = members.map(m => ({ name: m.name, diff: paid[m.name] - perPerson }));
  const maxDev = Math.max(1, ...entries.map(e => Math.abs(e.diff)));

  const bars = entries.map(e => {
    const pct = Math.abs(e.diff) / maxDev * 45;
    const isOver = e.diff > 0;
    const left = isOver ? 50 : 50 - pct;
    const color = isOver ? '#9ece6a' : '#f7768e';
    const label = isOver ? `+${fmt(e.diff)}` : fmt(e.diff);
    return `<div class="fair-row">
      <div class="fair-label">${avatar(e.name,22)}<span>${esc(e.name)}</span></div>
      <div class="fair-track"><div class="fair-mid"></div>
        <div class="fair-bar" style="left:${left}%;width:${pct}%;background:${color}"></div>
      </div>
      <span class="fair-val">${label}</span>
    </div>`;
  }).join('');

  return `<div class="card"><h2>Split Fairness</h2>
    <p class="hint-line">Deviation from equal share (${fmt(perPerson)}/person)</p>
    <div class="fair-chart">${bars}</div>
  </div>`;
}

// Best-effort device location, reused for ~10 min. Asks the browser at most once
// per session; on denial/unsupported we remember and never block on it again.
let geoState = { coords: null, at: 0, denied: false, pending: null };
function getCoords() {
  if (geoState.denied) return Promise.resolve(null);               // user explicitly blocked
  if (!navigator.geolocation) { console.warn('[geo] Geolocation API unavailable (needs HTTPS).'); return Promise.resolve(null); }
  if (!window.isSecureContext) console.warn('[geo] Not a secure context — geolocation may be blocked. Use HTTPS or localhost.');
  if (geoState.coords && Date.now() - geoState.at < 600000) return Promise.resolve(geoState.coords);
  if (geoState.pending) return geoState.pending;
  geoState.pending = new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        geoState.coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        geoState.at = Date.now(); geoState.pending = null;
        console.info('[geo] fix:', geoState.coords);
        resolve(geoState.coords);
      },
      err => {
        geoState.pending = null;
        // Only a real permission denial (code 1) should stop us asking again this
        // session. Timeouts/position-unavailable are transient — allow a retry.
        if (err && err.code === 1) { geoState.denied = true; console.warn('[geo] permission denied'); }
        else console.warn('[geo] error (will retry):', err && err.message, 'code', err && err.code);
        resolve(null);
      },
      { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 }
    );
  });
  return geoState.pending;
}

// Best-effort suggestion. The time-of-day activity loads instantly; the "@ place"
// tag is added in the background once (slow) geolocation resolves, so location
// never blocks the suggestion.
let descSuggestion = { text: '', at: 0, place: '' };
function setLocChip(html, cls) {
  const chip = $('#locChip');
  if (!chip) return;
  if (!html) { chip.hidden = true; return; }
  chip.className = 'loc-chip' + (cls ? ' ' + cls : '');
  chip.innerHTML = html;
  chip.hidden = false;
}
function showLocChip() {
  if (descSuggestion.place) setLocChip(icon('pin',13) + ' ' + esc(descSuggestion.place));
  else setLocChip('');
}
function showLocLoading() { setLocChip('<span class="loc-spin"></span> Locating…', 'loading'); }
const shortPlace = p => (p || '').split(',')[0].trim();

async function fillDescSuggestion() {
  const desc = $('#eDesc');
  if (!desc || desc.value) return;
  let touched = false, lastSet = '';
  desc.addEventListener('input', () => { touched = true; }, { once: true });
  const display = () => descSuggestion.text
    + (descSuggestion.place ? ' @ ' + shortPlace(descSuggestion.place) : '');
  // Write our suggestion only while the user hasn't typed and the field still
  // holds whatever we last put there (so we never clobber manual edits).
  const apply = () => {
    if (touched || !descSuggestion.text) return;
    if (desc.value && desc.value !== lastSet) return;
    lastSet = display();
    desc.value = lastSet;
    desc.classList.add('suggested');
    desc.addEventListener('focus', () => desc.classList.remove('suggested'), { once: true });
  };

  // 1) Fast: time-of-day suggestion, no location, no blocking.
  try {
    if (!descSuggestion.text || Date.now() - descSuggestion.at > 1800000) {
      const r = await api('GET', '/suggest-description');
      descSuggestion.text = r.suggestion || ''; descSuggestion.at = Date.now();
    }
    apply(); showLocChip();
  } catch (e) { /* suggestion is optional */ }

  // 2) Background: resolve location (with a spinner), then tag "@ place" on.
  try {
    if (!descSuggestion.place && !geoState.denied && navigator.geolocation) showLocLoading();
    const coords = await getCoords();
    if (!coords) { showLocChip(); return; }          // hides spinner if no fix
    const r = await api('GET', `/reverse-geocode?lat=${coords.lat}&lon=${coords.lon}`);
    if (!r.place) { console.warn('[geo] coords sent but no place resolved:', r); showLocChip(); return; }
    descSuggestion.place = r.place;
    showLocChip(); apply();
  } catch (e) { showLocChip(); /* location tag is optional */ }
}

    area.innerHTML = d.members.map((x,i)=>`
      <div class="splitrow" style="animation-delay:${i*35}ms">${avatar(x.name)}<span>${esc(x.name)}</span>

function totalPaise() { return Math.round((parseFloat($('#eAmt')?.value) || 0) * 100); }

function equalSeed() {
  const d = state.detail, n = d.members.length, t = totalPaise();
  if (!t || !n) return d.members.map(() => '');
  const base = Math.floor(t / n), rem = t - base * n;
  return d.members.map((_, i) => ((base + (i < rem ? 1 : 0)) / 100).toFixed(2));
}

function exactSumPaise() {
  let sum = 0;
  document.querySelectorAll('.exact').forEach(i => { const v = parseFloat(i.value); if (v > 0) sum += Math.round(v * 100); });
  return sum;
}

function updateSplitSum() {
  const el = $('#splitSum'); if (!el) return;
  const t = totalPaise(), s = exactSumPaise();
  if (!t) { el.textContent = 'Enter the total amount above first.'; el.className = 'split-sum'; return; }
  if (s === t) { el.textContent = `✓ Splits add up to ${fmt(t)}`; el.className = 'split-sum ok'; }
  else { el.textContent = `Splits total ${fmt(s)} — must equal ${fmt(t)} (off by ${fmt(Math.abs(s - t))})`; el.className = 'split-sum bad'; }
}

function wireTab() {
  const d = state.detail;
  if (activeTab === 'overview') {
    $('#tabbody').querySelectorAll('.stat-v[data-count]').forEach(animateCount);

    $('#chatSuggest').querySelectorAll('button').forEach(b => b.onclick = () => sendChat(b.dataset.q));
  }
  if (activeTab === 'history') {

      fetch(a.href, { headers: { 'Authorization': 'Basic ' + authToken } })
        .then(r => r.blob())
        .then(blob => { a.href = URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href); })
        .catch(() => toast('Export failed'));
    };
    $('#tabbody').querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      if (!await confirmAction({ title:'Delete expense?',
        message:'It will be struck through and kept in history — you can undo it later.',
        ok:'Delete', danger:true })) return;
      const eid = b.dataset.del;
      const exp = d.expenses.find(x => String(x.id) === String(eid));
      // Never synced yet: drop the queued add and remove it locally — there's no
      // server row to delete, so we don't enqueue a delete for a phantom id.
      if (exp && exp.pending) {
        outbox = outbox.filter(o => !(o.kind === 'expense' && o.client_id === exp.client_id));
        saveOutbox();
        d.expenses = d.expenses.filter(x => x !== exp);
        recomputeDetail(d); saveSnapshot(); renderMain();
        toast('Expense removed');
        return;
      }
      queueMutation({ kind: 'delete', gid: d.group.id, eid }, dd => localSetDeleted(dd, eid, true));
      toast('Expense deleted');
    });
    $('#tabbody').querySelectorAll('[data-undel]').forEach(b => b.onclick = async () => {
      if (!await confirmAction({ title:'Restore expense?',
        message:'This expense will count toward balances again.', ok:'Restore' })) return;
      const eid = b.dataset.undel;
      queueMutation({ kind: 'restore', gid: d.group.id, eid }, dd => localSetDeleted(dd, eid, false));
      toast('Expense restored');
    });
    $('#tabbody').querySelectorAll('[data-exp]').forEach(row => row.onclick = ev => {
      if (ev.target.closest('button')) return;  // let delete/undo buttons work
      const e = d.expenses.find(x => String(x.id) === String(row.dataset.exp));  // ids may be uuids (pending) or ints
      if (e) expenseModal(e);
    });
  }
  if (activeTab === 'balance') {
    const ms = $('#manualSettle');
    if (ms) ms.onclick = () => settlementModal(d);
  }
}

async function ensureOverview(gid) {
  const ov = state.overview[gid];
  if (ov && (ov.text || ov.loading)) { renderOverviewBox(); return; }
  // AI needs the network — don't try (and don't cache) when offline; the user can
  // tap refresh once back online.
  if (!navigator.onLine) {
    state.overview[gid] = { text: '*The trip summary needs a connection — it’ll be back online.*', loading: false, offline: true };
    renderOverviewBox();
    return;
  }
  state.overview[gid] = { text: '', loading: true };
  renderOverviewBox();
  try {
    const r = await fetchAuthed('/api/groups/'+gid+'/ask', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question: OVERVIEW_PROMPT }),
    });
    if (!r.ok) { const t = await r.json().catch(()=>({detail:r.statusText})); throw new Error(t.detail||'error'); }
    const reader = r.body.getReader(); const dec = new TextDecoder();
    state.overview[gid].text = '';
    while (true) {
      const {done, value} = await reader.read(); if (done) break;
      state.overview[gid].text += dec.decode(value, {stream:true}); renderOverviewBox();
    }
    if (!state.overview[gid].text) state.overview[gid].text = '_No expenses yet._';
